# tmux — managed by chezmoi. Plugins via tpm (cloned by .chezmoiexternal.toml).

# Prefix: C-a (easier than C-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g set-clipboard on

# True color (matches WezTerm/Neovim)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"

# vi-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Splits keep current path; intuitive bindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "reloaded"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
# Match WezTerm/Neovim ("Catppuccin Mocha").
set -g @catppuccin_flavour 'mocha'

# Initialize tpm (keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
