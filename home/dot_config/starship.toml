# Starship prompt — managed by chezmoi.
# The active `palette` line is swapped by `dots theme` (it writes a copy to
# ~/.config/dots/starship.toml that the shells point STARSHIP_CONFIG at, so this
# committed file stays clean). Module styles reference palette colour names
# (green/red/blue/…), so switching the palette retints the whole prompt.
add_newline = true
command_timeout = 1000
palette = "catppuccin_mocha"

format = "$hostname$directory$git_branch$git_status$rust$golang$python$nodejs$cmd_duration$line_break$character"

[hostname]
ssh_only = false
format = "[$hostname](bold green) "
trim_at = "."

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[git_branch]
symbol = " "
style = "bold magenta"

[git_status]
style = "bold red"

[cmd_duration]
min_time = 2000
format = "[ $duration](bold yellow) "

[rust]
symbol = " "
style = "bold red"
[golang]
symbol = " "
style = "bold cyan"
[python]
symbol = " "
style = "bold yellow"
[nodejs]
symbol = " "
style = "bold green"

# --- Palettes ---------------------------------------------------------------
# Only the default (catppuccin) block lives here, as the standalone fallback for
# a fresh machine before `dots theme` runs. Every other theme's palette block is
# GENERATED from themes.nu into ~/.config/dots/starship.toml (the file shells
# actually point STARSHIP_CONFIG at) — the registry is the single source of truth.
[palettes.catppuccin_mocha]
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#cba6f7"
cyan = "#94e2d5"
