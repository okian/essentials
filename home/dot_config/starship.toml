# Starship prompt — managed by chezmoi.
# The active `palette` line is swapped by `dots theme` (it writes a copy to
# ~/.config/dots/starship.toml that the shells point STARSHIP_CONFIG at, so this
# committed file stays clean). Module styles reference palette colour names
# (green/red/blue/…), so switching the palette retints the whole prompt.
add_newline = true
command_timeout = 1000
palette = "catppuccin_mocha"

format = "$directory$git_branch$git_status$rust$golang$python$nodejs$cmd_duration$line_break$character"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[git_branch]
symbol = " "
style = "bold magenta"

[git_status]
style = "bold red"

[cmd_duration]
min_time = 2000
format = "[ $duration](bold yellow) "

[rust]
symbol = " "
style = "bold red"
[golang]
symbol = " "
style = "bold cyan"
[python]
symbol = " "
style = "bold yellow"
[nodejs]
symbol = " "
style = "bold green"

