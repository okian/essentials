# Custom television channel — managed by chezmoi.
# Pick a git project (under ~/repos or ~/projects) and act on it:
# `tv projects` (or the `proj` nushell helper, which cd's into the pick).
# Modeled on the bundled `git-repos.toml` but scoped to the dev roots with a
# README/tree preview. No `enter` action → Enter prints the path so `proj` can
# cd; Ctrl-E opens it in the editor; Ctrl-S jumps into that repo's symbols.
# Each root is searched only if it exists, so this is portable across machines.
[metadata]
name = "projects"
requirements = ["fd", "git"]
description = "Pick a git project under ~/repos or ~/projects; preview README/tree; cd, edit, or jump to symbols."

[source]
command = "for d in ~/repos ~/projects; do [ -d \"$d\" ] && fd -g .git -HL -t d -d 5 --prune \"$d\" --exec dirname '{}'; done"
display = "{split:/:-1}"

[preview]
command = "cd '{}'; if [ -f README.md ]; then bat -n --color=always README.md; else eza --tree --level=2 --color=always; fi"

[keybindings]
ctrl-e = "actions:edit"
ctrl-s = "actions:symbols"

[actions.edit]
description = "Open project in editor"
command = "${EDITOR:-vim} {}"
shell = "bash"
mode = "execute"

[actions.symbols]
description = "Fuzzy-search symbols in this project"
command = "tv symbols {}"
mode = "execute"
