# Single source of truth for everything installed via a package manager.
#
# Edit this file, then run `chezmoi apply` (or `essentials update`). The
# run_onchange_ installer scripts embed a hash of this file, so any change
# here automatically re-runs the relevant installer — no other wiring needed.
#
#   brew_formulae : CLI tools, installed via Homebrew on BOTH macOS and Linux.
#   brew_casks    : GUI apps, macOS only (Homebrew casks don't exist on Linux).
#   linux_apt     : extra apt packages for Linux GUI/desktop bits.
#   linux_flatpak : flatpak app IDs used as a Linux GUI fallback.
#
# Per-language dev tools, installed by run_onchange_after_20 via each language's
# own installer (not brew), so they match the active toolchain:
#   go_tools     : `go install <pkg>`        -> ~/go/bin
#   cargo_tools  : `cargo binstall`/`install` -> ~/.cargo/bin
#   python_tools : `uv tool install <pkg>`   -> ~/.local/bin (isolated venvs)
#   node_globals : `npm install -g <pkg>`
# (Rust clippy/rustfmt/rust-analyzer are rustup *components*, added there too.)
#
# Languages with first-class version managers (rust→rustup, swift→swiftly,
# python envs→uv) are intentionally NOT listed here; see run_onchange_after_20.

packages:
  brew_formulae:
    # chezmoi itself (so it self-updates & stays on PATH)
    - chezmoi
    # shells + prompt
    - nushell
    - zsh
    - zsh-autosuggestions
    - zsh-fast-syntax-highlighting
    - starship
    # shell UX: completions, dir env, history sync
    - carapace
    - direnv
    - atuin
    # editors
    - neovim
    - emacs
    # fuzzy finding + navigation
    - fzf
    - zoxide
    - ripgrep
    - fd
    - bat
    - eza
    # git + tooling
    - git
    - git-delta
    - lazygit
    - gh
    - git-lfs
    # secrets (age-keygen for the encryption keypair)
    - age
    - gnupg
    - git-crypt
    # git-hooks tooling (secret scan, linters, formatters)
    - gitleaks
    - golangci-lint
    - swiftlint
    - swiftformat
    - ruff
    - ktlint
    - shellcheck
    - shfmt
    # media
    - ffmpeg
    # languages / runtimes managed via brew (latest)
    - go
    - python
    - uv
    - node          # needed by many LSPs / Claude Code npm fallback
    # containers
    - podman
    - podman-compose
    # cloud
    - awscli
    # misc utilities
    - jq
    - yq
    - tmux
    - wget
    - tree
    # productivity / TUIs
    - tealdeer      # tldr: example-first man pages (`tldr tar`)
    - just          # task runner (per-project justfile)
    - yazi          # terminal file manager with image/video previews
    - btop          # system monitor
    - dust          # du replacement (disk usage)
    - duf           # df replacement (free space)
    - procs         # ps replacement
    - sd            # sed replacement (find & replace)
    - hyperfine     # command benchmarking
    - xh            # Rust HTTPie (HTTP client)
    - jless         # interactive JSON viewer
    - zellij        # tmux alternative (available; tmux stays default)
    # git extras
    - difftastic    # structural, syntax-aware diffs (`git dft`)
    - git-absorb    # auto-route staged hunks into fixup commits
    # kubernetes (KUBE_EDITOR already points at nvim)
    - kubernetes-cli  # kubectl
    - k9s             # cluster TUI
    # container / security
    - trivy         # CVE + secret scanner (images, repos, IaC)
    - dive          # inspect container image layers
    # yazi preview helpers
    - poppler       # PDF previews
    - sevenzip      # archive previews / extraction
    # media (pairs with ffmpeg + the DaVinci assets)
    - imagemagick   # still-image swiss-army knife
    - exiftool      # read/write media metadata
    - yt-dlp        # download video/audio

  # macOS-only GUI apps (Homebrew casks). For each, see linux_flatpak for the
  # Linux equivalent. Exceptions handled elsewhere:
  #   - claude, iina : macOS-only (no Linux build).
  #   - ollama, tailscale : on Linux installed via vendor script
  #     (see run_onchange_after_60-linux-apps).
  brew_casks:
    - wezterm
    - font-jetbrains-mono-nerd-font
    # editors / terminals
    - zed
    - alacritty
    # ai / containers
    - claude
    - ollama
    # utilities / comms
    - google-chrome
    - tailscale
    - discord
    - iina

  # Linux desktop extras (only used when a GUI session is present).
  linux_apt:
    - fonts-jetbrains-mono
    # nvim system clipboard + archive tooling (mac has pbcopy/built-in)
    - wl-clipboard
    - xclip
    - unzip

  # Linux GUI fallback (Flathub app IDs).
  linux_flatpak:
    - org.wezfurlong.wezterm
    - dev.zed.Zed
    - org.alacritty.Alacritty
    - com.google.Chrome
    - com.discordapp.Discord

  # --- Per-language developer tools (installed by run_onchange_after_20) -----
  # Trim freely; each list re-runs the installer when changed.

  # Go: `go install <module>@<version>` -> ~/go/bin (gopls/dlv also via Mason).
  go_tools:
    - golang.org/x/tools/cmd/goimports@latest   # auto-import + format
    - golang.org/x/tools/gopls@latest           # language server
    - github.com/go-delve/delve/cmd/dlv@latest  # debugger
    - mvdan.cc/gofumpt@latest                    # stricter gofmt

  # Rust: extra cargo binaries (clippy/rustfmt/rust-analyzer are rustup components).
  cargo_tools:
    - cargo-edit        # cargo add/rm/upgrade
    - cargo-nextest     # faster test runner
    - cargo-watch       # re-run on file change

  # Python: global CLIs in isolated uv-managed venvs (ruff is already in brew).
  python_tools:
    - pytest
    - mypy
    - ipython

  # Node: global CLIs (editor LSPs are also managed by LazyVim/Mason).
  node_globals:
    - typescript
    - prettier
    - eslint
    - neovim          # Node provider for Neovim (:checkhealth)
